<div class="container mt-4">
  <h2>Create User</h2>

  <form [formGroup]="userForm" (ngSubmit)="onSubmit()" class="card p-3" novalidate>
    <div class="mb-3">
      <label for="name" class="form-label">Name *</label>
      <input id="name" type="text" class="form-control" formControlName="name" />
    </div>

    <div class="mb-3">
      <label for="email" class="form-label">Email *</label>
      <input id="email" type="email" class="form-control" formControlName="email" />
    </div>

    <div class="mb-3">
      <label for="username" class="form-label">Username *</label>
      <input id="username" type="text" class="form-control" formControlName="username" />
    </div>

    <div class="mb-3">
      <label for="password" class="form-label">Password *</label>
      <input id="password" type="password" class="form-control" formControlName="password" />
    </div>

    <button type="submit" class="btn btn-primary" [disabled]="userForm.invalid">Create</button>
  </form>
</div>
