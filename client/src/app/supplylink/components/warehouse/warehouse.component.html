<h2>Warehouse Registration</h2>

<!-- Backend error banner -->
<div *ngIf="backendError" class="alert alert-danger" role="alert">
  {{ backendError }}
</div>

<form [formGroup]="warehouseForm" (ngSubmit)="onSubmit()" novalidate>
  <!-- Supplier ID -->
  <div class="form-group">
    <label for="supplierId">Supplier ID</label>
    <input
      id="supplierId"
      type="number"
      class="form-control"
      formControlName="supplierId"
      [class.is-invalid]="ctrl('supplierId').invalid && (ctrl('supplierId').touched || submitted)"
    />
    <div class="invalid-feedback" *ngIf="ctrl('supplierId').errors && (ctrl('supplierId').touched || submitted)">
      <div *ngIf="ctrl('supplierId').errors['required']">Supplier ID is required.</div>
      <div *ngIf="ctrl('supplierId').errors['min']">Supplier ID must be greater than 0.</div>
    </div>
  </div>

  <!-- Warehouse Name -->
  <div class="form-group">
    <label for="warehouseName">Warehouse Name</label>
    <input
      id="warehouseName"
      type="text"
      class="form-control"
      formControlName="warehouseName"
      [class.is-invalid]="ctrl('warehouseName').invalid && (ctrl('warehouseName').touched || submitted)"
    />
    <div class="invalid-feedback" *ngIf="ctrl('warehouseName').errors && (ctrl('warehouseName').touched || submitted)">
      <div *ngIf="ctrl('warehouseName').errors['required']">Warehouse name is required.</div>
      <div *ngIf="backendFieldErrors.warehouseName">{{ backendFieldErrors.warehouseName }}</div>
    </div>
  </div>

  <!-- Location -->
  <div class="form-group">
    <label for="location">Location</label>
    <input
      id="location"
      type="text"
      class="form-control"
      formControlName="location"
      [class.is-invalid]="ctrl('location').invalid && (ctrl('location').touched || submitted)"
    />
    <div class="invalid-feedback" *ngIf="ctrl('location').errors && (ctrl('location').touched || submitted)">
      <div *ngIf="ctrl('location').errors['required']">Location is required.</div>
    </div>
  </div>

  <!-- Capacity -->
  <div class="form-group">
    <label for="capacity">Capacity</label>
    <input
      id="capacity"
      type="number"
      class="form-control"
      formControlName="capacity"
      [class.is-invalid]="ctrl('capacity').invalid && (ctrl('capacity').touched || submitted)"
    />
    <div class="invalid-feedback" *ngIf="ctrl('capacity').errors && (ctrl('capacity').touched || submitted)">
      <div *ngIf="ctrl('capacity').errors['required']">Capacity is required.</div>
      <div *ngIf="ctrl('capacity').errors['min']">Capacity must be non-negative.</div>
    </div>
  </div>

  <button class="btn btn-primary mt-2" type="submit" [disabled]="warehouseForm.invalid">Register Warehouse</button>

  <!-- Success banner -->
  <div *ngIf="successMessage" class="alert alert-success mt-3">
    {{ successMessage }}
  </div>
</form>
