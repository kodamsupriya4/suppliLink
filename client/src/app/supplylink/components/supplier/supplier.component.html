<div class="container mt-4">
  <h2>Supplier Registration</h2>

  <div *ngIf="success$ | async as ok" class="alert alert-success">{{ ok }}</div>
  <div *ngIf="error$ | async as err" class="alert alert-danger">{{ err }}</div>

  <form [formGroup]="supplierForm" (ngSubmit)="onSubmit()" class="card p-3" novalidate>

    <div class="mb-3">
      <label for="supplierName" class="form-label">Supplier Name *</label>
      <input id="supplierName" type="text" class="form-control" formControlName="supplierName">
      <div class="text-danger mt-1" *ngIf="supplierName.touched && supplierName.invalid">
        <small *ngIf="supplierName.errors?.['required']">Supplier name is required.</small>
      </div>
    </div>

    <div class="mb-3">
      <label for="email" class="form-label">Email *</label>
      <input id="email" type="email" class="form-control" formControlName="email">
      <div class="text-danger mt-1" *ngIf="email.touched && email.invalid">
        <small *ngIf="email.errors?.['required']">Email is required.</small>
        <small *ngIf="email.errors?.['email']">Enter a valid email.</small>
      </div>
    </div>

    <div class="mb-3">
      <label for="phone" class="form-label">Phone</label>
      <input id="phone" type="text" class="form-control" formControlName="phone">
    </div>

    <div class="mb-3">
      <label for="address" class="form-label">Address</label>
      <input id="address" type="text" class="form-control" formControlName="address">
    </div>

    <div class="mb-3">
      <label for="username" class="form-label">Username *</label>
      <input id="username" type="text" class="form-control" formControlName="username">
      <div class="text-danger mt-1" *ngIf="username.touched && username.invalid">
        <small *ngIf="username.errors?.['required']">Username is required.</small>
        <small *ngIf="username.errors?.['specialChars']">Only letters, numbers and underscore allowed.</small>
      </div>
    </div>

    <div class="mb-3">
      <label for="password" class="form-label">Password *</label>
      <input id="password" type="password" class="form-control" formControlName="password">
      <div class="text-danger mt-1" *ngIf="password.touched && password.invalid">
        <small *ngIf="password.errors?.['required']">Password is required.</small>
        <small *ngIf="password.errors?.['minlength']">Min 8 characters.</small>
      </div>
    </div>

    <div class="mb-3">
      <label for="role" class="form-label">Role *</label>
      <select id="role" class="form-select" formControlName="role">
        <option value="" disabled selected>Select a role</option>
        <option value="USER">USER</option>
        <option value="ADMIN">ADMIN</option>
      </select>
      <div class="text-danger mt-1" *ngIf="role.touched && role.invalid">
        <small *ngIf="role.errors?.['required']">Role is required.</small>
      </div>
    </div>

    <button class="btn btn-primary" type="submit" [disabled]="supplierForm.invalid">Submit</button>
  </form>
</div>
