
<!-- Create Registeration form with input field  that has following id
registerName: this will represent the person name
registerEmail: this will represent the email id 
registerUsername: this will represent the  username 
registerPassword: this will represent the password
create a button and onclick you call function register() from validation.js

The form will contain the following validation rules ;
Every field is required 
registerUsername: it will not contain any special characters 
registerEmail: it will be a valid email
registerPassword: it will be of atleast 8 characters 
-->

<!DOCTYPE html>
<html lang="en">
<head>
      <script src="validation.js"></script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Registration</title>
  <style>
    /* Optional basic styling */
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; background:#f6f7f9; padding: 40px; }
    .card { max-width: 420px; margin: 0 auto; background: #fff; border: 1px solid #e5e7eb; border-radius: 12px; padding: 24px; box-shadow: 0 6px 18px rgba(0,0,0,.06); }
    .title { margin: 0 0 16px; font-size: 1.25rem; }
    .field { margin-bottom: 14px; }
    label { display: block; margin-bottom: 6px; font-weight: 600; }
    input[type="text"], input[type="email"], input[type="password"] {
      width: 100%; padding: 10px 12px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 0.95rem; outline: none;
    }
    input[aria-invalid="true"] { border-color: #dc2626; background: #fff5f5; }
    .error { color: #b91c1c; font-size: 0.85rem; min-height: 1.1em; margin-top: 6px; }
    .btn { width: 100%; margin-top: 6px; padding: 10px 14px; background: #2563eb; color: white; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; }
    .success { color: #065f46; background: #ecfdf5; border: 1px solid #a7f3d0; padding: 10px 12px; border-radius: 8px; margin-top: 12px; display:none; }
  </style>
</head>
<body>
  <div class="card">
    <h1 class="title">Register</h1>

    <form id="registerForm" novalidate>
      <!-- Name -->
      <div class="field">
        <label for="registerName">Full Name</label>
        <input
          type="text"
          id="registerName"
          name="name"
          aria-invalid="false"
          aria-describedby="nameError"
          autocomplete="name"
        />
        <div id="nameError" class="error" aria-live="polite"></div>
      </div>

      <!-- Email -->
      <div class="field">
        <label for="registerEmail">Email</label>
        <input
          type="email"
          id="registerEmail"
          name="email"
          aria-invalid="false"
          aria-describedby="emailError"
          autocomplete="email"
        />
        <div id="emailError" class="error" aria-live="polite"></div>
      </div>

      <!-- Username -->
      <div class="field">
        <label for="registerUsername">Username</label>
        <input
          type="text"
          id="registerUsername"
          name="username"
          aria-invalid="false"
          aria-describedby="usernameError"
          autocomplete="username"
          placeholder="Letters, numbers, underscores only"
        />
        <div id="usernameError" class="error" aria-live="polite"></div>
      </div>


      <div class="field">
        <label for="registerPassword">Password</label>
        <input
          type="password"
          id="registerPassword"
          name="password"
          aria-invalid="false"
          aria-describedby="passwordError"
          autocomplete="new-password"
          placeholder="At least 8 characters"
        />
        <div id="passwordError" class="error" aria-live="polite"></div>
      </div>
      <button type="button" class="btn" onclick="register()">Create Account</button>

      <div id="successMsg" class="success">Registration is valid. Submitting…</div>
    </form>
  </div>
</body>
</html>
